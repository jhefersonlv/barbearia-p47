<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbearia P47 — Vila Ema, São José dos Campos</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="icon" href="assets/logotipo.png" type="image/png">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <style>
    /* ─── RESET & VARIÁVEIS ─────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #C9A84C;
      --gold-light: #e0c06a;
      --gold-dark: #9a7930;
      --army-green: #3D4430;
      --army-green-light: #525B40;
      --p47-blue: #1A222E;
      --black: #0A0B0D;
      --dark: #121417;
      --dark2: #1A1D21;
      --dark3: #24292E;
      --white: #F5F7F9;
      --gray: #8E9196;
      --rivet: #3F444D;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      overflow-x: hidden;
    }

    ::selection {
      background: var(--gold);
      color: var(--black);
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--black);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--gold-dark);
      border-radius: 2px;
    }

    input::placeholder,
    textarea::placeholder {
      color: #444;
    }

    input:focus,
    textarea:focus {
      outline: none;
    }

    /* ─── ANIMAÇÕES ─────────────────────────────────────────────────── */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .5;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes floatY {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes floatY2 {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-4px);
      }
    }

    @keyframes glowPulse {

      0%,
      100% {
        opacity: .35;
      }

      50% {
        opacity: .65;
      }
    }

    /* ─── HOVER: CARDS DE SERVIÇO ───────────────────────────────────── */
    .svc-card:hover .svc-img {
      transform: scale(1.06);
    }

    .gallery-item:hover .gallery-img {
      transform: scale(1.06);
    }

    /* ─── HERO RESPONSIVIDADE ───────────────────────────────────────── */
    .hero-content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    @media (max-width: 992px) {
      .hero-content-grid {
        grid-template-columns: 1fr !important;
        gap: 40px !important;
        text-align: center;
        padding-top: 140px !important;
        padding-bottom: 60px !important;
      }

      .hero-content-grid>div {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .hero-content-grid h1 {
        font-size: 42px !important;
      }

      .hero-content-grid img {
        max-width: 280px !important;
      }
    }

    @media (max-width: 768px) {
      nav {
        padding: 0 20px !important;
      }

      nav>div:nth-child(2) {
        display: none !important;
      }

      section {
        padding-left: 20px !important;
        padding-right: 20px !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ─── MOCK: HORÁRIOS ──────────────────────────────────────────────

    const MOCK_WORKING_DAYS = [
      { dayOfWeek: 0, isWorkingDay: false, timeSlots: [] },
      { dayOfWeek: 1, isWorkingDay: true, timeSlots: [{ startTime: "09:00", endTime: "12:00" }, { startTime: "14:00", endTime: "20:00" }] },
      { dayOfWeek: 2, isWorkingDay: true, timeSlots: [{ startTime: "09:00", endTime: "12:00" }, { startTime: "14:00", endTime: "20:00" }] },
      { dayOfWeek: 3, isWorkingDay: true, timeSlots: [{ startTime: "09:00", endTime: "12:00" }, { startTime: "14:00", endTime: "20:00" }] },
      { dayOfWeek: 4, isWorkingDay: true, timeSlots: [{ startTime: "09:00", endTime: "12:00" }, { startTime: "14:00", endTime: "20:00" }] },
      { dayOfWeek: 5, isWorkingDay: true, timeSlots: [{ startTime: "09:00", endTime: "12:00" }, { startTime: "14:00", endTime: "20:00" }] },
      { dayOfWeek: 6, isWorkingDay: true, timeSlots: [{ startTime: "09:00", endTime: "18:00" }] },

    const MOCK_WORKING_DAYS_SAT_OFF = MOCK_WORKING_DAYS.map(d =>
      d.dayOfWeek === 6 ? { ...d, isWorkingDay: false, timeSlots: [] } : d
    );

    // ─── MOCK: SERVIÇOS ──────────────────────────────────────────────

    const MOCK_SERVICES = [
      { id: "svc-001", category: "Corte", name: "Corte Masculino Premium", details: "Geometria do Corte personalizada para o formato do seu rosto. Corte clássico ou moderno, com acabamento de navalha.", unitPrice: "65.00", durationMinutes: 45, position: 1, isActive: true, imageUrl: "https://images.unsplash.com/photo-1622286342621-4bd786c2447c?w=600&h=400&fit=crop&q=80" },
      { id: "svc-002", category: "Barba", name: "Barboterapia", details: "Modelagem completa com produtos premium: hidratação, desenho preciso e acabamento com toalha quente.", unitPrice: "55.00", durationMinutes: 40, position: 2, isActive: true, imageUrl: "assets/barboterapia.jpg" },
      { id: "svc-003", category: "Penteados", name: "Penteados Modernos", details: "Finalização e styling profissional com pomada, wax ou gel. Do look casual ao social, seu estilo definido.", unitPrice: "45.00", durationMinutes: 30, position: 3, isActive: true, imageUrl: "assets/penteados.jpg" },
      { id: "svc-004", category: "Visagismo", name: "Visagismo", details: "Consultoria completa de estilo: analisamos o formato do rosto e projetamos o corte ideal para sua identidade.", unitPrice: "120.00", durationMinutes: 60, position: 4, isActive: true, imageUrl: "assets/visagismo.jpg" },
    ];

    // ─── MOCK: EQUIPE ────────────────────────────────────────────────

    const MOCK_EMPLOYEES = [
      { id: "emp-001", name: "Júlio Castro", position: "Fundador & Mestre Barbeiro", specialty: "Geometria do Corte · Visagismo · Tricologia", initials: "JC", bgColor: "#2a1f0a", isFounder: true, imageUrl: "assets/julio_castro.jpg", workingHours: { enabled: true, timezone: "America/Sao_Paulo", workingDays: MOCK_WORKING_DAYS } },
      { id: "emp-002", name: "César", position: "Barbeiro Sênior", specialty: "Cortes Clássicos · Navalhação", initials: "CS", bgColor: "#0a1a2a", isFounder: false, imageUrl: "assets/cesar.jpg", workingHours: { enabled: true, timezone: "America/Sao_Paulo", workingDays: MOCK_WORKING_DAYS } },
      { id: "emp-003", name: "Borges", position: "Barbeiro", specialty: "Cortes Modernos · Degradê", initials: "BG", bgColor: "#1a0a2a", isFounder: false, imageUrl: "assets/borges.jpg", workingHours: { enabled: true, timezone: "America/Sao_Paulo", workingDays: MOCK_WORKING_DAYS } },
    ];

    // ─── MOCK: DEPOIMENTOS ───────────────────────────────────────────

    const MOCK_TESTIMONIALS = [
      { name: "Lucas Cavalieri", text: "Cabelo muito bem tratado pelo profissional César! Recomendo a barbearia e o barbeiro!", stars: 5 },
      { name: "Gabriel Marques", text: "Excelente atendimento do Profissional Yago! Atencioso com o cliente e suas preferências. Com certeza ganhou um cliente!", stars: 5 },
      { name: "Guilherme Mores", text: "Fui atendido pelo Rafael e fiquei muito satisfeito. Ele é um profissional atencioso, cuidadoso e deu ótimas dicas.", stars: 5 },
      { name: "Andre Moreira", text: "Atendimento excelente! A Yasmin foi muito simpática e mostrou conhecimento sobre visagismo. Ela dá sugestões para criar um visual harmônico.", stars: 5 },
      { name: "Dani Moura", text: "Que experiência incrível! Eu e meu filho fomos muito bem atendidos. Os profissionais são extremamente capacitados!", stars: 5 },
      { name: "Marcos Nogueira", text: "A Yasmim é sensacional. Atendimento top, corte e barba perfeitos, papo muito agradável. Veste a camisa da barbearia!", stars: 5 },
    ];

    // ─── LOJA: PRODUTOS ──────────────────────────────────────────────

    const SHOP_PRODUCTS = [
      { id: "p-001", name: "Tônico Capilar F47", desc: "Estimula o crescimento, fortalece os fios e nutre o couro cabeludo. O mesmo produto usado na barbearia. 150ml", price: "89.90", badge: "Mais Vendido", img: "assets/tonico_capila.jpg" },
      { id: "p-002", name: "Pomada de Fixação Forte", desc: "Acabamento mate com fixação extra forte o dia todo. Não resseca nem pesa. 100g", price: "49.90", badge: null, img: "assets/tonico_capila.jpg" },
      { id: "p-003", name: "Spray Laque Profissional", desc: "Fijación extra forte para finalização de penteados elaborados. Secagem rápida. 200ml", price: "39.90", badge: null, img: "assets/tonico_capila.jpg" },
      { id: "p-004", name: "Tônico Antiqueda P47", desc: "Protocolo tricológico com ativos fortalecedores. Reduz queda e estimula novos fios. 120ml", price: "74.90", badge: "Novo", img: "assets/tonico_capila.jpg" },
      { id: "p-005", name: "Kit Pentes Profissional", desc: "3 pentes de madeira natural para estilo e desmalhamento. O mesmo kit usado pelos barbeiros da P47", price: "34.90", badge: null, img: "assets/tonico_capila.jpg" },
      { id: "p-006", name: "Loção Pós-Barba F47", desc: "Hidratante calmante pós-barbear com aloe vera e vitamina E. Elimina ardência e irrita ção. 100ml", price: "54.90", badge: null, img: "assets/tonico_capila.jpg" },
    ];

    // ─── GALERIA ─────────────────────────────────────────────────────

    const GALLERY_ITEMS = [
      { label: 'Corte Masculino', img: 'https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=900&h=600&fit=crop&q=80' },
      { label: 'Barboterapia', img: 'assets/barboterapia.jpg' },
      { label: 'Visagismo', img: 'https://images.unsplash.com/photo-1585747860715-2ba37e788b70?w=600&h=400&fit=crop&q=80' },
      { label: 'Coloração', img: 'https://images.unsplash.com/photo-1560869713-7d0a29430803?w=600&h=400&fit=crop&q=80' },
      { label: 'Ambiente P47', img: 'assets/ambiente.png' },
      { label: 'Resultado Final', img: 'https://images.unsplash.com/photo-1605497788044-5a32c7078486?w=600&h=400&fit=crop&q=80' },
    ];

    // ─── HELPERS DE SLOT ─────────────────────────────────────────────

    function seededRandom(seed) {
      let s = Math.abs(seed) % 2147483647;
      return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
    }
    function dateToSeed(dateStr, empId) {
      const str = dateStr + empId;
      return str.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
    }
    function generateAllSlots(emp, dayOfWeek, durationMin) {
      if (!emp?.workingHours?.workingDays) return [];
      const wd = emp.workingHours.workingDays.find(d => d.dayOfWeek === dayOfWeek);
      if (!wd || !wd.isWorkingDay) return [];
      const slots = [];
      for (const ts of (wd.timeSlots || [])) {
        const [sh, sm] = ts.startTime.split(':').map(Number);
        const [eh, em] = ts.endTime.split(':').map(Number);
        const start = sh * 60 + sm, end = eh * 60 + em;
        for (let t = start; t + durationMin <= end; t += 30) {
          const s = `${String(Math.floor(t / 60)).padStart(2, '0')}:${String(t % 60).padStart(2, '0')}`;
          const e2 = t + durationMin;
          const en = `${String(Math.floor(e2 / 60)).padStart(2, '0')}:${String(e2 % 60).padStart(2, '0')}`;
          slots.push({ startTime: s, endTime: en });
        }
      }
      return slots;
    }

    // ─── MOCK API ─────────────────────────────────────────────────────

    async function mockApiCall(endpoint, options = {}) {
      await new Promise(r => setTimeout(r, 250));
      if (endpoint === '/external/v1/services')
        return { services: MOCK_SERVICES, cachedAt: new Date().toISOString() };
      if (endpoint === '/external/v1/booking/employees')
        return { employees: MOCK_EMPLOYEES };
      if (endpoint.startsWith('/external/v1/booking/slots')) {
        const params = new URLSearchParams(endpoint.split('?')[1] || '');
        const empId = params.get('employeeId') || '';
        const dateStr = params.get('date') || '';
        const serviceIds = (params.get('serviceIds') || '').split(',').filter(Boolean);
        const emp = MOCK_EMPLOYEES.find(e => e.id === empId);
        const services = serviceIds.map(id => MOCK_SERVICES.find(s => s.id === id)).filter(Boolean);
        const total = services.reduce((sum, s) => sum + (s.durationMinutes || 60), 0) || 60;
        const d = new Date(dateStr + 'T12:00:00');
        const allSlots = generateAllSlots(emp, d.getDay(), total);
        const rand = seededRandom(dateToSeed(dateStr, empId));
        return {
          date: dateStr, employeeId: empId, employeeName: emp?.name || '',
          totalDurationMinutes: total, availableSlots: allSlots.filter(() => rand() > 0.3),
          timezone: 'America/Sao_Paulo',
        };
      }
      if (endpoint === '/external/v1/booking' && options.method === 'POST') {
        const body = JSON.parse(options.body || '{}');
        const emp = MOCK_EMPLOYEES.find(e => e.id === body.employeeId);
        const svcs = (body.serviceIds || []).map(id => MOCK_SERVICES.find(s => s.id === id)).filter(Boolean);
        const totalPrice = svcs.reduce((sum, s) => sum + parseFloat(s.unitPrice), 0);
        const totalDuration = svcs.reduce((sum, s) => sum + (s.durationMinutes || 60), 0);
        const [bh, bm] = (body.time || '09:00').split(':').map(Number);
        const endMin = bh * 60 + bm + totalDuration;
        const endTime = `${String(Math.floor(endMin / 60)).padStart(2, '0')}:${String(endMin % 60).padStart(2, '0')}`;
        return {
          id: `bk-${Date.now()}`, scheduledAt: `${body.date}T${body.time}:00.000-03:00`,
          endAt: `${body.date}T${endTime}:00.000-03:00`, employeeName: emp?.name || 'Profissional',
          totalPrice: totalPrice.toFixed(2), orderDisplayNumber: Math.floor(Math.random() * 9000) + 1000,
        };
      }
      throw new Error('Endpoint mock não encontrado');
    }

    // ─── API CONFIG ───────────────────────────────────────────────────

    let apiConfig = {
      apiUrl: localStorage.getItem('p47_apiUrl') || '',
      apiKey: localStorage.getItem('p47_apiKey') || '',
      apiSecret: localStorage.getItem('p47_apiSecret') || '',
    };
    function saveApiConfig(url, key, secret) {
      apiConfig = { apiUrl: url, apiKey: key, apiSecret: secret };
      localStorage.setItem('p47_apiUrl', url);
      localStorage.setItem('p47_apiKey', key);
      localStorage.setItem('p47_apiSecret', secret);
    }

    // ─── HELPERS ──────────────────────────────────────────────────────

    const DAY_SHORT = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
    const DAY_FULL = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];

    function getWeekStart(date) {
      const d = new Date(date); d.setDate(d.getDate() - d.getDay()); d.setHours(0, 0, 0, 0); return d;
    }
    function fmtDate(date) { return date.toISOString().split('T')[0]; }
    function fmtCurrency(v) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(parseFloat(v || 0)); }
    function fmtPhone(phone) {
      const c = phone.replace(/\D/g, '');
      if (c.length === 11) return `(${c.slice(0, 2)}) ${c.slice(2, 7)}-${c.slice(7)}`;
      if (c.length === 10) return `(${c.slice(0, 2)}) ${c.slice(2, 6)}-${c.slice(6)}`;
      return phone;
    }
    function employeeWorksOnDay(emp, dayOfWeek) {
      if (!emp?.workingHours?.workingDays) return true;
      const wd = emp.workingHours.workingDays.find(d => d.dayOfWeek === dayOfWeek);
      return !!(wd && wd.isWorkingDay && wd.timeSlots?.length > 0);
    }

    // ─── API CALLER (real → mock fallback) ────────────────────────────

    async function apiCall(endpoint, options = {}) {
      const { apiUrl, apiKey, apiSecret } = apiConfig;
      if (apiUrl && apiKey && apiSecret) {
        try {
          const resp = await fetch(`${apiUrl}${endpoint}`, {
            ...options,
            headers: { 'Content-Type': 'application/json', 'X-Api-Key': apiKey, 'X-Api-Secret': apiSecret, ...(options.headers || {}) },
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          return await resp.json();
        } catch (err) {
          console.warn('[P47] API indisponível, usando mock:', err.message);
          return mockApiCall(endpoint, options);
        }
      }
      return mockApiCall(endpoint, options);
    }

    // ─── COMPONENTES BASE ─────────────────────────────────────────────

    function GoldLine() {
      return <div style={{ height: 1, background: 'linear-gradient(90deg,transparent,var(--gold),transparent)' }} />;
    }
    function SectionLabel({ children }) {

        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
          <div className="military-stripes"><div></div><div></div></div>

        </div>

    }
    function StarRating({ stars }) {
      return (
        <div style={{ display: 'flex', gap: 3 }}>
          {Array.from({ length: stars }).map((_, i) => (
            <svg key={i} width="12" height="12" viewBox="0 0 12 12" fill="var(--gold)">
              <polygon points="6,1 7.5,4.5 11,4.8 8.5,7 9.2,10.5 6,8.7 2.8,10.5 3.5,7 1,4.8 4.5,4.5" />
            </svg>
          ))}
        </div>
      );
    }
    function Spinner() {
      return (
        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', padding: 32 }}>
          <div style={{ width: 28, height: 28, border: '2px solid #2a2a2a', borderTopColor: 'var(--gold)', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
        </div>
      );
    }
    function ServiceImage({ service, size = 64 }) {
      const [imgError, setImgError] = useState(false);
      const iconSize = Math.round(size * 0.45);
      if (service.imageUrl && !imgError) {
        return <img src={service.imageUrl} alt={service.name} onError={() => setImgError(true)} style={{ width: size, height: size, objectFit: 'cover', borderRadius: 3, flexShrink: 0 }} />;
      }
      return (
        <div style={{ width: size, height: size, background: '#161616', border: '1px solid #2a2a2a', borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          <svg width={iconSize} height={iconSize} viewBox="0 0 24 24" fill="var(--gold-dark)" opacity="0.6">
            <path d="M9.64 7.64c.23-.5.36-1.05.36-1.64 0-2.21-1.79-4-4-4S2 3.79 2 6s1.79 4 4 4c.59 0 1.14-.13 1.64-.36L10 12l-2.36 2.36C7.14 14.13 6.59 14 6 14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4c0-.59-.13-1.14-.36-1.64L12 14l7 7h3v-1L9.64 7.64zM6 8c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm0 12c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm6-7.5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5.5.22.5.5-.22.5-.5.5zM19 3l-6 6 2 2 7-7V3z" />
          </svg>
        </div>
      );
    }

    // ─── CONFIG MODAL ─────────────────────────────────────────────────

    function ConfigModal({ onClose, onSave }) {
      const [url, setUrl] = useState(apiConfig.apiUrl);
      const [key, setKey] = useState(apiConfig.apiKey);
      const [secret, setSecret] = useState(apiConfig.apiSecret);
      const handleSave = () => { saveApiConfig(url.trim().replace(/\/$/, ''), key.trim(), secret.trim()); onSave(); onClose(); };
      const inputStyle = { width: '100%', background: '#161616', border: '1px solid #2a2a2a', borderRadius: 2, padding: '10px 12px', color: 'var(--white)', fontSize: 13, fontFamily: 'Outfit' };
      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)', zIndex: 2000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
          <div style={{ background: 'var(--dark)', border: '1px solid #2a2a2a', borderRadius: 4, width: '100%', maxWidth: 440, padding: 32 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
              <div style={{ fontFamily: 'Playfair Display', fontSize: 18, fontWeight: 700 }}>Configurar API</div>
              <button onClick={onClose} style={{ background: 'none', border: '1px solid #333', color: '#888', width: 32, height: 32, borderRadius: 2, cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>
            </div>
            <p style={{ fontSize: 12, color: '#666', marginBottom: 20, lineHeight: 1.6 }}>Configure as credenciais da API para usar dados reais. Sem configuração, o sistema usa dados de demonstração.</p>
            {[
              { label: 'URL da API', value: url, set: setUrl, type: 'text', ph: 'https://api.seusite.com' },
              { label: 'API Key', value: key, set: setKey, type: 'text', ph: 'wrd_...' },
              { label: 'API Secret', value: secret, set: setSecret, type: 'password', ph: 'sk_...' },
            ].map(f => (
              <div key={f.label} style={{ marginBottom: 16 }}>
                <label style={{ display: 'block', fontSize: 11, color: '#888', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 6 }}>{f.label}</label>
                <input type={f.type} value={f.value} onChange={e => f.set(e.target.value)} placeholder={f.ph} style={inputStyle}
                  onFocus={e => e.target.style.borderColor = 'var(--gold)'} onBlur={e => e.target.style.borderColor = '#2a2a2a'} />
              </div>
            ))}
            <div style={{ display: 'flex', gap: 12, marginTop: 24 }}>
              <button onClick={onClose} style={{ flex: 1, background: 'none', border: '1px solid #333', color: '#888', padding: '11px', cursor: 'pointer', borderRadius: 2, fontFamily: 'Outfit', fontSize: 13 }}>Cancelar</button>
              <button onClick={handleSave} style={{ flex: 2, background: 'var(--gold)', color: 'var(--black)', border: 'none', padding: '11px', cursor: 'pointer', borderRadius: 2, fontFamily: 'Outfit', fontSize: 13, fontWeight: 700, letterSpacing: '0.05em' }}>Salvar & Conectar</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── BOOKING MODAL ────────────────────────────────────────────────

    function BookingModal({ onClose, initialServices, initialEmployees }) {
      const [step, setStep] = useState(1);
      const [services, setServices] = useState(initialServices || []);
      const [employees, setEmployees] = useState(initialEmployees || []);
      const [catFilter, setCatFilter] = useState('Todos');
      const [selectedSvcs, setSelectedSvcs] = useState([]);
      const [selectedEmp, setSelectedEmp] = useState(null);
      const [weekStart, setWeekStart] = useState(getWeekStart(new Date()));
      const [selectedDate, setSelectedDate] = useState(null);
      const [allSlots, setAllSlots] = useState([]);
      const [availSlots, setAvailSlots] = useState([]);
      const [selectedSlot, setSelectedSlot] = useState(null);
      const [slotsLoading, setSlotsLoading] = useState(false);
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [phone, setPhone] = useState('');
      const [obs, setObs] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [booked, setBooked] = useState(false);
      const [bookingResult, setBookingResult] = useState(null);
      const [toast, setToast] = useState(null);

      useEffect(() => {
        if (!services.length) apiCall('/external/v1/services').then(d => setServices(d.services || []));
        if (!employees.length) apiCall('/external/v1/booking/employees').then(d => setEmployees(d.employees || []));
      }, []);

      const showToast = (msg, type = 'info') => { setToast({ msg, type }); setTimeout(() => setToast(null), 3500); };
      const scrollToShop = () => { onClose(); setTimeout(() => document.getElementById('loja')?.scrollIntoView({ behavior: 'smooth' }), 350); };

      const cats = useMemo(() => {
        const hasCat = services.some(s => s.category);
        if (!hasCat) return [];
        return ['Todos', ...new Set(services.map(s => s.category).filter(Boolean))];
      }, [services]);

      const filteredSvcs = useMemo(() => {
        if (!cats.length || catFilter === 'Todos') return services.filter(s => s.isActive !== false);
        return services.filter(s => s.category === catFilter && s.isActive !== false);
      }, [services, cats, catFilter]);

      const selectedSvcsData = useMemo(() => selectedSvcs.map(id => services.find(s => s.id === id)).filter(Boolean), [selectedSvcs, services]);
      const totalPrice = selectedSvcsData.reduce((sum, s) => sum + parseFloat(s.unitPrice || 0), 0);
      const totalDuration = selectedSvcsData.reduce((sum, s) => sum + (s.durationMinutes || 60), 0);

      const toggleSvc = id => setSelectedSvcs(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

      const loadSlots = async (emp, date) => {
        if (!emp || !date) return;
        setSlotsLoading(true); setAllSlots([]); setAvailSlots([]); setSelectedSlot(null);
        try {
          const generated = generateAllSlots(emp, date.getDay(), totalDuration || 60);
          setAllSlots(generated);
          const data = await apiCall(`/external/v1/booking/slots?employeeId=${emp.id}&date=${fmtDate(date)}&serviceIds=${selectedSvcs.join(',')}`);
          setAvailSlots(data.availableSlots || []);
        } catch { showToast('Erro ao carregar horários', 'error'); }
        finally { setSlotsLoading(false); }
      };

      const selectDate = dateStr => {
        const d = new Date(dateStr + 'T12:00:00'); setSelectedDate(d); setSelectedSlot(null);
        if (selectedEmp) loadSlots(selectedEmp, d);
      };
      const selectEmployee = emp => {
        setSelectedEmp(emp); setSelectedSlot(null);
        if (selectedDate) loadSlots(emp, selectedDate);
      };
      const navWeek = dir => {
        const ns = new Date(weekStart); ns.setDate(ns.getDate() + dir * 7);
        if (ns >= getWeekStart(new Date())) { setWeekStart(ns); setSelectedDate(null); setSelectedSlot(null); setAllSlots([]); setAvailSlots([]); }
      };
      const canNext = () => {
        if (step === 1) return selectedSvcs.length > 0;
        if (step === 2) return !!(selectedEmp && selectedDate && selectedSlot);
        if (step === 3) return name.trim().length > 1 && phone.trim().replace(/\D/g, '').length >= 10;
        return false;
      };
      const handleConfirm = async () => {
        setSubmitting(true);
        try {
          const result = await apiCall('/external/v1/booking', {
            method: 'POST',
            body: JSON.stringify({ employeeId: selectedEmp.id, date: fmtDate(selectedDate), time: selectedSlot.startTime, serviceIds: selectedSvcs, customerName: name.trim(), customerEmail: email.trim() || undefined, customerPhone: phone.replace(/\D/g, '') || undefined, observation: obs.trim() || undefined, createOrder: false }),
          });
          setBookingResult(result); setBooked(true);
        } catch (err) { showToast(err.message || 'Erro ao confirmar agendamento', 'error'); }
        finally { setSubmitting(false); }
      };

      const today = new Date(); today.setHours(0, 0, 0, 0);
      const weekDays = Array.from({ length: 7 }, (_, i) => { const d = new Date(weekStart); d.setDate(d.getDate() + i); return d; });
      const inputSt = { width: '100%', background: '#161616', border: '1px solid #2a2a2a', borderRadius: 2, padding: '11px 13px', color: 'var(--white)', fontSize: 14, fontFamily: 'Outfit' };
      const stepLabels = ['Serviços', 'Agendamento', 'Seus dados', 'Confirmar'];

      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
          <div style={{ background: 'var(--dark)', border: '1px solid #2a2a2a', borderRadius: 4, width: '100%', maxWidth: 740, maxHeight: '92vh', display: 'flex', flexDirection: 'column', position: 'relative', animation: 'fadeIn 0.2s ease' }}>

            {/* Header */}
            <div style={{ padding: '24px 32px 20px', borderBottom: '1px solid #1e1e1e' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div style={{ color: 'var(--gold)', fontSize: 11, letterSpacing: '0.2em', fontWeight: 600, textTransform: 'uppercase', marginBottom: 4 }}>Barbearia P47</div>
                  <div style={{ fontFamily: 'Playfair Display', fontSize: 22, fontWeight: 700 }}>Agendar Horário</div>
                </div>
                <button onClick={onClose} style={{ background: 'none', border: '1px solid #333', color: '#888', width: 36, height: 36, borderRadius: 2, cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>
              </div>
              {!booked && (
                <div style={{ display: 'flex', gap: 0, marginTop: 24 }}>
                  {stepLabels.map((label, i) => {
                    const n = i + 1, active = step === n, done = step > n;
                    return (
                      <div key={n} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', position: 'relative' }}>
                        {i < stepLabels.length - 1 && <div style={{ position: 'absolute', top: 14, left: '50%', right: '-50%', height: 1, background: done ? 'var(--gold)' : '#2a2a2a', transition: 'background 0.3s' }} />}
                        <div style={{ width: 28, height: 28, borderRadius: '50%', background: done ? 'var(--gold)' : active ? 'transparent' : '#1a1a1a', border: `1.5px solid ${done || active ? 'var(--gold)' : '#333'}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 600, color: done ? 'var(--black)' : active ? 'var(--gold)' : '#555', zIndex: 1, transition: 'all 0.3s' }}>
                          {done ? '✓' : n}
                        </div>
                        <div style={{ fontSize: 10, color: active ? 'var(--gold)' : done ? '#888' : '#555', marginTop: 6, fontWeight: active ? 600 : 400 }}>{label}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Body */}
            <div style={{ flex: 1, overflowY: 'auto', padding: '24px 32px' }}>

              {booked ? (
                <div style={{ textAlign: 'center', padding: '32px 0' }}>
                  <div style={{ width: 64, height: 64, border: '2px solid var(--gold)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 24px', fontSize: 28, color: 'var(--gold)' }}>✓</div>
                  <div style={{ fontFamily: 'Playfair Display', fontSize: 26, marginBottom: 8 }}>Agendamento Confirmado!</div>
                  {bookingResult && (
                    <div style={{ color: '#888', fontSize: 14, lineHeight: 2, marginBottom: 28 }}>
                      <div>{selectedSvcsData.map(s => s.name).join(' + ')}</div>
                      <div>com <strong style={{ color: 'var(--white)' }}>{bookingResult.employeeName}</strong></div>
                      <div>{DAY_FULL[selectedDate?.getDay()]}, {selectedDate?.toLocaleDateString('pt-BR')} às <strong style={{ color: 'var(--gold)' }}>{selectedSlot?.startTime}</strong></div>
                      <div style={{ marginTop: 4 }}>Total: <strong style={{ color: 'var(--gold)' }}>{fmtCurrency(bookingResult.totalPrice)}</strong></div>
                      {bookingResult.orderDisplayNumber && <div>Pedido: <strong style={{ color: 'var(--white)' }}>#{bookingResult.orderDisplayNumber}</strong></div>}
                    </div>
                  )}
                  <div style={{ background: '#1a1a1a', border: '1px solid #2a2a2a', borderRadius: 3, padding: 20, fontSize: 13, color: '#666', marginBottom: 24, lineHeight: 1.7 }}>
                    Você receberá confirmação via WhatsApp em breve.<br />
                    Dúvidas? <a href="https://wa.me/5512981365015" style={{ color: 'var(--gold)', textDecoration: 'none' }}>(12) 98136-5015</a>
                  </div>
                  <button onClick={onClose} style={{ background: 'none', color: '#888', border: '1px solid #2a2a2a', padding: '11px 28px', fontWeight: 500, fontSize: 13, cursor: 'pointer', borderRadius: 2, fontFamily: 'Outfit', marginBottom: 24 }}>Fechar</button>

                  {/* CTA Tônico Capilar */}
                  <div style={{ background: 'linear-gradient(135deg,rgba(201,168,76,0.08),rgba(201,168,76,0.03))', border: '1px solid rgba(201,168,76,0.3)', borderRadius: 4, padding: '24px', textAlign: 'left', display: 'flex', gap: 20, alignItems: 'center' }}>
                    <div style={{ width: 72, height: 72, borderRadius: 3, overflow: 'hidden', flexShrink: 0, background: '#111' }}>
                      <img src="assets/tonico_capila.jpg" alt="Tônico Capilar F47" style={{ width: '100%', height: '100%', objectFit: 'cover' }} onError={e => e.target.style.display = 'none'} />
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 10, color: 'var(--gold)', letterSpacing: '0.2em', textTransform: 'uppercase', fontWeight: 600, marginBottom: 4 }}>Oferta exclusiva para clientes</div>
                      <div style={{ fontFamily: 'Playfair Display', fontSize: 17, fontWeight: 700, marginBottom: 6, color: 'var(--white)' }}>Conheça o Tônico Capilar F47</div>
                      <p style={{ fontSize: 12, color: '#777', lineHeight: 1.6, marginBottom: 14 }}>Fortaleça seus fios em casa com o mesmo produto usado pelos nossos barbeiros.</p>
                      <button onClick={scrollToShop} style={{ background: 'var(--gold)', color: 'var(--black)', border: 'none', padding: '10px 22px', fontWeight: 700, fontSize: 12, cursor: 'pointer', borderRadius: 2, fontFamily: 'Outfit', letterSpacing: '0.08em', textTransform: 'uppercase' }}>
                        Ver Produtos P47 →
                      </button>
                    </div>
                  </div>
                </div>

              ) : step === 1 ? (
                <div>
                  {cats.length > 0 && (
                    <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 20 }}>
                      {cats.map(c => (
                        <button key={c} onClick={() => setCatFilter(c)} style={{ padding: '6px 14px', borderRadius: 2, border: '1px solid', borderColor: catFilter === c ? 'var(--gold)' : '#2a2a2a', background: catFilter === c ? 'rgba(201,168,76,0.1)' : 'transparent', color: catFilter === c ? 'var(--gold)' : '#888', fontSize: 12, cursor: 'pointer', fontFamily: 'Outfit', fontWeight: catFilter === c ? 600 : 400 }}>{c}</button>
                      ))}
                    </div>
                  )}
                  <div style={{ display: 'grid', gap: 8 }}>
                    {filteredSvcs.map(s => {
                      const sel = selectedSvcs.includes(s.id);
                      return (
                        <div key={s.id} onClick={() => toggleSvc(s.id)} style={{ padding: '14px 16px', border: '1px solid', borderColor: sel ? 'var(--gold)' : '#2a2a2a', borderRadius: 3, cursor: 'pointer', background: sel ? 'rgba(201,168,76,0.06)' : '#161616', display: 'flex', alignItems: 'center', gap: 14, transition: 'all 0.2s' }}>
                          <ServiceImage service={s} size={72} />
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 500, fontSize: 14, marginBottom: 2, color: sel ? 'var(--white)' : '#ccc' }}>{s.name}</div>
                            {s.details && <div style={{ fontSize: 12, color: '#666', lineHeight: 1.4 }}>{s.details}</div>}
                            <div style={{ fontSize: 11, color: '#555', marginTop: 4 }}>⏱ {s.durationMinutes || 60} min</div>
                          </div>
                          <div style={{ textAlign: 'right', flexShrink: 0 }}>
                            <div style={{ color: 'var(--gold)', fontWeight: 700, fontSize: 16, fontFamily: 'Playfair Display' }}>{fmtCurrency(s.unitPrice)}</div>
                            <div style={{ width: 20, height: 20, borderRadius: '50%', border: `2px solid ${sel ? 'var(--gold)' : '#333'}`, background: sel ? 'var(--gold)' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', marginLeft: 'auto', marginTop: 6, fontSize: 11, color: 'var(--black)', fontWeight: 700, transition: 'all 0.2s' }}>{sel ? '✓' : ''}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {selectedSvcs.length > 0 && (
                    <div style={{ marginTop: 20, padding: '14px 16px', background: '#161616', border: '1px solid #2a2a2a', borderRadius: 3 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13 }}>
                        <span style={{ color: '#888' }}>{selectedSvcs.length} serviço{selectedSvcs.length > 1 ? 's' : ''} selecionado{selectedSvcs.length > 1 ? 's' : ''}</span>
                        <span style={{ color: 'var(--gold)', fontWeight: 700 }}>{fmtCurrency(totalPrice)} · {totalDuration} min</span>
                      </div>
                    </div>
                  )}
                </div>

              ) : step === 2 ? (
                <div>
                  <div style={{ marginBottom: 24 }}>
                    <div style={{ fontSize: 12, color: '#888', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10 }}>Escolha o dia</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <button onClick={() => navWeek(-1)} style={{ width: 36, height: 36, background: 'none', border: '1px solid #2a2a2a', borderRadius: 2, color: '#888', cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>←</button>
                      <div style={{ display: 'flex', gap: 6, flex: 1, overflowX: 'auto' }}>
                        {weekDays.map((d, i) => {
                          const past = d < today, sel = selectedDate && fmtDate(d) === fmtDate(selectedDate);
                          return (
                            <button key={i} disabled={past} onClick={() => selectDate(fmtDate(d))} style={{ flexShrink: 0, flex: 1, minWidth: 52, padding: '10px 6px', border: '1px solid', borderColor: sel ? 'var(--gold)' : '#2a2a2a', background: sel ? 'rgba(201,168,76,0.1)' : '#161616', borderRadius: 2, cursor: past ? 'not-allowed' : 'pointer', textAlign: 'center', opacity: past ? 0.35 : 1, transition: 'all 0.2s' }}>
                              <div style={{ fontSize: 10, color: sel ? 'var(--gold)' : '#666', textTransform: 'uppercase', marginBottom: 4 }}>{DAY_SHORT[d.getDay()]}</div>
                              <div style={{ fontSize: 20, fontWeight: 700, fontFamily: 'Playfair Display', color: sel ? 'var(--gold)' : '#aaa', lineHeight: 1 }}>{d.getDate()}</div>
                            </button>
                          );
                        })}
                      </div>
                      <button onClick={() => navWeek(1)} style={{ width: 36, height: 36, background: 'none', border: '1px solid #2a2a2a', borderRadius: 2, color: '#888', cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>→</button>
                    </div>
                  </div>
                  {selectedDate && (
                    <div style={{ marginBottom: 24 }}>
                      <div style={{ fontSize: 12, color: '#888', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10 }}>Escolha o profissional</div>
                      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(160px,1fr))', gap: 10 }}>
                        {employees.map(emp => {
                          const works = employeeWorksOnDay(emp, selectedDate.getDay());
                          const isSel = selectedEmp?.id === emp.id;
                          const inits = emp.initials || emp.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
                          return (
                            <div key={emp.id} onClick={() => works && selectEmployee(emp)} style={{ padding: 16, border: '1px solid', borderColor: isSel ? 'var(--gold)' : '#2a2a2a', borderRadius: 3, cursor: works ? 'pointer' : 'not-allowed', background: isSel ? 'rgba(201,168,76,0.06)' : '#161616', textAlign: 'center', opacity: works ? 1 : 0.45, transition: 'all 0.2s' }}>
                              <div style={{ width: 52, height: 52, borderRadius: '50%', background: emp.bgColor || '#1a1a1a', border: `2px solid ${isSel ? 'var(--gold)' : '#2a2a2a'}`, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 10px', fontFamily: 'Playfair Display', fontSize: 17, fontWeight: 700, color: 'rgba(201,168,76,0.7)' }}>{inits}</div>
                              <div style={{ fontSize: 13, fontWeight: 600, color: isSel ? 'var(--white)' : '#ccc', marginBottom: 3 }}>{emp.name}</div>
                              <div style={{ fontSize: 11, color: '#666' }}>{emp.position}</div>
                              {!works && <div style={{ fontSize: 10, color: '#c44', marginTop: 4 }}>Não disponível</div>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                  {selectedDate && selectedEmp && (
                    <div>
                      <div style={{ fontSize: 12, color: '#888', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10 }}>Horários disponíveis</div>
                      {slotsLoading ? <Spinner /> : allSlots.length === 0 ? (
                        <div style={{ color: '#555', fontSize: 13, padding: 16, textAlign: 'center' }}>Nenhum horário configurado para este dia</div>
                      ) : (
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                          {(() => {
                            const availSet = new Set(availSlots.map(s => s.startTime));
                            return allSlots.map(slot => {
                              const avail = availSet.has(slot.startTime), isSel = selectedSlot?.startTime === slot.startTime;
                              return (
                                <button key={slot.startTime} disabled={!avail} onClick={() => setSelectedSlot(slot)} style={{ padding: '10px 16px', border: '1px solid', borderColor: isSel ? 'var(--gold)' : avail ? '#2a2a2a' : '#1e1e1e', borderRadius: 2, background: isSel ? 'rgba(201,168,76,0.12)' : avail ? '#161616' : '#111', color: isSel ? 'var(--gold)' : avail ? '#aaa' : '#333', fontSize: 13, cursor: avail ? 'pointer' : 'not-allowed', fontFamily: 'Outfit', fontWeight: isSel ? 600 : 400, textDecoration: !avail ? 'line-through' : 'none', transition: 'all 0.2s' }}>
                                  {slot.startTime}
                                </button>
                              );
                            });
                          })()}
                        </div>
                      )}
                    </div>
                  )}
                  {!selectedDate && <div style={{ textAlign: 'center', padding: 24, color: '#555', fontSize: 13 }}>Selecione um dia para ver os profissionais disponíveis</div>}
                </div>

              ) : step === 3 ? (
                <div style={{ display: 'grid', gap: 16 }}>
                  <div style={{ background: '#161616', border: '1px solid #2a2a2a', borderRadius: 3, padding: '12px 16px', fontSize: 13, color: '#888', marginBottom: 4 }}>
                    {selectedSvcsData.map(s => s.name).join(' + ')} · com <strong style={{ color: 'var(--white)' }}>{selectedEmp?.name}</strong> · {selectedDate?.toLocaleDateString('pt-BR')} às <strong style={{ color: 'var(--gold)' }}>{selectedSlot?.startTime}</strong>
                  </div>
                  {[
                    { label: 'Seu nome *', value: name, set: setName, type: 'text', ph: 'Nome completo' },
                    { label: 'WhatsApp *', value: phone, set: setPhone, type: 'tel', ph: '(12) 9XXXX-XXXX' },
                    { label: 'E-mail', value: email, set: setEmail, type: 'email', ph: 'seu@email.com' },
                  ].map(f => (
                    <div key={f.label}>
                      <label style={{ display: 'block', fontSize: 11, color: '#888', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 6 }}>{f.label}</label>
                      <input type={f.type} value={f.value} onChange={e => f.set(e.target.value)} placeholder={f.ph} style={inputSt}
                        onFocus={e => e.target.style.borderColor = 'var(--gold)'} onBlur={e => e.target.style.borderColor = '#2a2a2a'} />
                    </div>
                  ))}
                  <div>
                    <label style={{ display: 'block', fontSize: 11, color: '#888', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 6 }}>Observação</label>
                    <textarea value={obs} onChange={e => setObs(e.target.value)} placeholder="Alguma preferência ou observação?" rows={3}
                      style={{ ...inputSt, resize: 'vertical' }}
                      onFocus={e => e.target.style.borderColor = 'var(--gold)'} onBlur={e => e.target.style.borderColor = '#2a2a2a'} />
                  </div>
                </div>

              ) : (
                <div>
                  <div style={{ background: '#161616', border: '1px solid #2a2a2a', borderRadius: 3, padding: 20, marginBottom: 20 }}>
                    <div style={{ fontSize: 11, color: '#666', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 14 }}>Resumo do agendamento</div>
                    {[
                      { label: 'Data', value: selectedDate && `${DAY_FULL[selectedDate.getDay()]}, ${selectedDate.toLocaleDateString('pt-BR')}` },
                      { label: 'Horário', value: selectedSlot && `${selectedSlot.startTime} — ${selectedSlot.endTime}`, gold: true },
                      { label: 'Profissional', value: selectedEmp?.name },
                      { label: 'Cliente', value: name },
                      { label: 'WhatsApp', value: fmtPhone(phone) },
                      email && { label: 'E-mail', value: email },
                    ].filter(Boolean).map(row => (
                      <div key={row.label} style={{ display: 'flex', justifyContent: 'space-between', padding: '7px 0', borderBottom: '1px solid #2a2a2a' }}>
                        <span style={{ fontSize: 13, color: '#888' }}>{row.label}</span>
                        <span style={{ fontSize: 13, fontWeight: 500, color: row.gold ? 'var(--gold)' : 'var(--white)' }}>{row.value}</span>
                      </div>
                    ))}
                    <div style={{ marginTop: 14 }}>
                      <div style={{ fontSize: 11, color: '#666', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 8 }}>Serviços</div>
                      {selectedSvcsData.map(s => (

    // ─── APP ──────────────────────────────────────────────────────────

    function App() {
      const [bookingOpen, setBookingOpen] = useState(false);
      const [configOpen, setConfigOpen] = useState(false);
      const [services, setServices] = useState([]);
      const [employees, setEmployees] = useState([]);
      const [dataLoading, setDataLoading] = useState(true);
      const [usingMock, setUsingMock] = useState(false);

      const loadData = useCallback(async () => {
        setDataLoading(true);
        const noApi = !apiConfig.apiUrl || !apiConfig.apiKey || !apiConfig.apiSecret;
        if (noApi) setUsingMock(true);
        try {
          const [svcData, empData] = await Promise.all([
            apiCall('/external/v1/services'),
            apiCall('/external/v1/booking/employees'),
          ]);
          setServices(svcData.services || []);
          setEmployees(empData.employees || []);
        } catch {
          setServices(MOCK_SERVICES);
          setEmployees(MOCK_EMPLOYEES);
          setUsingMock(true);
        } finally {
          setDataLoading(false);
        }
      }, []);

      useEffect(() => { loadData(); }, [loadData]);
      const handleBook = useCallback(() => setBookingOpen(true), []);

      return (
        <>

          <Nav onBook={handleBook} onConfig={() => setConfigOpen(true)} />
          <Hero onBook={handleBook} />
          <About />
          {dataLoading
            ? <div style={{ background: 'var(--dark)', padding: '80px 40px', textAlign: 'center' }}><Spinner /></div>
            : <Services services={services} onBook={handleBook} />
          }
          {!dataLoading && <Team employees={employees} onBook={handleBook} />}
          <Gallery />
          <Shop />
          <Testimonials />
          <CallToAction onBook={handleBook} />
          <Location />
          <Footer onBook={handleBook} />

          {bookingOpen && <BookingModal onClose={() => setBookingOpen(false)} initialServices={services} initialEmployees={employees} />}
          {configOpen && <ConfigModal onClose={() => setConfigOpen(false)} onSave={() => loadData()} />}

          <a href="https://wa.me/5512981365015" style={{ position: 'fixed', bottom: 24, left: 24, zIndex: 200, background: '#25D366', color: 'white', width: 52, height: 52, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', textDecoration: 'none', boxShadow: '0 4px 16px rgba(37,211,102,0.4)', transition: 'transform 0.2s' }}
            onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.1)'}
            onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" /></svg>
          </a>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
